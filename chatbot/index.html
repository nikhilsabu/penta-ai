<!doctype html>
<html lang="en" data-bs-theme="light">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Pentame AI Assistant Chatbot" />
    <title>Pentame AI Assistant</title>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&family=Sora:wght@600;700&display=swap"
      rel="stylesheet" />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet" />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
      rel="stylesheet" />
    <link
      href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.10.0/styles/github-dark.min.css"
      rel="stylesheet" />
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body>
    <main class="container py-5">
      <section class="hero-placeholder">
        <h1>Pentame Website Integration Area</h1>
        <p class="lead mb-0">
          This demo includes a production-ready floating AI assistant widget for
          Pentame.
        </p>
      </section>
    </main>

    <button
      id="chatToggle"
      class="chat-toggle"
      aria-label="Open Pentame AI Assistant"
      aria-controls="chatWidget"
      aria-expanded="false">
      <span class="robo-ring robo-ring--outer" aria-hidden="true"></span>
      <span class="robo-ring robo-ring--inner" aria-hidden="true"></span>
      <span class="robo-scan" aria-hidden="true"></span>
      <span class="chat-toggle-glow" aria-hidden="true"></span>
      <span class="robo-icon" aria-hidden="true">
        <svg viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
          <line class="robo-antenna" x1="32" y1="10" x2="32" y2="20" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"/>
          <circle class="robo-antenna-tip" cx="32" cy="7" r="3.5" fill="#22d3ee"/>
          <rect x="15" y="20" width="34" height="30" rx="9" fill="rgba(255,255,255,0.12)" stroke="currentColor" stroke-width="2.5"/>
          <circle class="robo-eye robo-eye--left" cx="25" cy="33" r="4.5" fill="#22d3ee"/>
          <circle class="robo-eye robo-eye--right" cx="39" cy="33" r="4.5" fill="#22d3ee"/>
          <rect x="27" y="42" width="10" height="3" rx="1.5" fill="currentColor" opacity="0.75"/>
          <rect x="20" y="52" width="24" height="4" rx="2" fill="currentColor" opacity="0.35"/>
        </svg>
      </span>
      <span class="robo-badge" aria-hidden="true">AI</span>
    </button>

    <section
      id="chatWidget"
      class="chat-widget"
      role="dialog"
      aria-modal="false"
      aria-label="Pentame AI Assistant"
      hidden>
      <header class="chat-header">
        <div class="chat-header-title">Pentame AI</div>
        <div class="chat-header-actions">
          <button id="chatTheme" class="icon-btn" aria-label="Toggle theme">
            <i class="bi bi-moon-stars"></i>
          </button>
          <button id="chatMinimize" class="icon-btn" aria-label="Minimize chat">
            <i class="bi bi-dash-lg"></i>
          </button>
        </div>
      </header>

      <div class="chat-empty-state" id="chatEmptyState">
        How can I help you?
      </div>

      <div
        id="chatMessages"
        class="chat-messages"
        aria-live="polite"
        aria-relevant="additions"></div>

      <div class="chat-suggestions-wrap">
        <div
          id="quickActions"
          class="quick-actions"
          aria-label="Quick actions"></div>
        <div
          id="suggestedResponses"
          class="suggested-responses"
          aria-label="Suggested responses"></div>
      </div>

      <form id="chatForm" class="chat-input-wrap" autocomplete="off">
        <label for="chatInput" class="visually-hidden">Type your message</label>
        <div class="chat-input-group">
          <input
            id="chatInput"
            type="text"
            class="form-control"
            placeholder="Type to Ask..."
            maxlength="2000"
            required />
          <button
            type="button"
            id="voiceBtn"
            class="input-icon-btn"
            aria-label="Voice input (coming soon)">
            <i class="bi bi-mic"></i>
          </button>
          <button
            type="button"
            id="fileBtn"
            class="input-icon-btn"
            aria-label="Upload file">
            <i class="bi bi-paperclip"></i>
          </button>
          <input
            id="fileInput"
            type="file"
            class="d-none"
            accept=".pdf,.txt,.md,.doc,.docx,.png,.jpg,.jpeg,.webp" />
          <button type="submit" class="send-btn" aria-label="Send message">
            <i class="bi bi-soundwave"></i>
          </button>
        </div>
      </form>
    </section>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.10.0/highlight.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/dompurify@3.2.4/dist/purify.min.js"></script>
    <script src="js/bootstrap.config.js"></script>
    <script src="js/api.js" defer></script>
    <script src="js/animation.js" defer></script>
    <script src="js/app.js" defer></script>
  </body>
</html>
